name: dev-ci
on:
    push:
        paths-ignore:
            - '**/*.md'
        branches-ignore:
            - main
    pull_request:
        branches-ignore:
            - main

jobs:
    dev-build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            # env
            - name: checkout code
              uses: actions/checkout@v6
            - name: setup pnpm
              uses: pnpm/action-setup@v4
            - name: setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml
            - name: install dependencies
              run: pnpm install --frozen-lockfile

            # build两个版本
            - name: build minify
              run: pnpm run build:minify
            - name: mkdir
              run: mkdir output
            - name: move and rename file
              run: mv dist/bilibili-cleaner.user.js output/bilibili-cleaner.min.user.js
            - name: build default
              run: pnpm run build
            - name: copy file
              run: cp dist/bilibili-cleaner.user.js output/
            - name: add doc
              run: cp LICENSE README.md CHANGELOG.md output/
            - name: list files
              run: ls -lah output/

            # 上传产物
            - name: upload-artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bilibili-cleaner
                  path: output/*
